    <style>
        body {
            background-image: url("{{ url_for('static', filename='ORCA.png') }}"); /* Assurez-vous que ORCA.png est dans app/static/ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
            margin: 0 auto; /* Centrer le conteneur */
        }

        h2 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        #analyzeBtn {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        #analyzeBtn:hover:not(:disabled) {
            background-color: #0056b3;
        }

        #analyzeBtn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #spectrogramContainer img {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 10px;
        }

        #status, #predictionResult {
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Analyse de sons marins</h2>
        <input type="file" id="audioInput" accept="audio/mp3, audio/wav">
        <button id="analyzeBtn">Analyser</button>
        <div id="status"></div>
        <div id="predictionResult"></div>
        <div id="spectrogramContainer"></div>
    </div>
    <!-- Lier le script JS externe qui gère la logique -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
