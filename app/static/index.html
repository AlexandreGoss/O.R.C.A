<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCA - Analyse Audio (Version Statique)</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script>
</head>
<body>
    <div class="container">
        <h1>Analyse Audio ORCA</h1>
        <div class="upload-container">
            <input type="file" id="audioInput" accept="audio/*">
            <button id="analyzeBtn">Analyser</button>
        </div>
        
        <div class="results">
            <h2>Résultats</h2>
            <div id="spectrogramContainer">
                <canvas id="spectrogram"></canvas>
            </div>
            <div id="predictionResult"></div>
        </div>
        
        <div class="status" id="status">Prêt à analyser</div>
    </div>

    <script src="js/audioProcessor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
